<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Greylock Radio</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #101114;
      color: #f3f3f3;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }

    main {
      text-align: center;

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: 0;

    p {
      margin: 0;
      color: #c9ccd2;
      font-size: 1.1rem;
    }
  </style>

  <main>
    <h1>Greylock Radio</h1>
    <p>Pagina de prueba funcionando.</p>
  </main>

</html>
